# ============================================
# 开发环境配置
# ============================================
spring:
  datasource:
    # H2 内存数据库（开发测试）
    url: ${DB_URL:jdbc:h2:mem:atplan;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

logging:
  level:
    service.RouteCacheService: DEBUG
    service.TravelPlanHistoryService: DEBUG
    org.hibernate.SQL: DEBUG
