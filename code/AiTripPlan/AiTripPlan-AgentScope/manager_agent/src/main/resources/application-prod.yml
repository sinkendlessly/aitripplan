# ============================================
# 生产环境配置
# ============================================
spring:
  datasource:
    # MySQL 数据库（生产）
    url: ${DB_URL:jdbc:mysql://localhost:3306/atplan?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USER:atplan}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    # 生产环境关闭 SQL 日志
    org.hibernate.SQL: WARN
