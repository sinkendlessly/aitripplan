server:
  port: 8082

spring:
  application:
    name: route-making-agent

# Agent配置
agent:
  # DashScope API Key - 请通过环境变量 DASHSCOPE_API_KEY 设置
  api-key: ${DASHSCOPE_API_KEY:your-api-key-here}

  # 模型配置
  model-name: ${AGENT_MODEL_NAME:qwen3-max}
  stream: true

  # 超时配置（秒）
  timeout-seconds: ${AGENT_TIMEOUT:60}

  # MCP配置
  mcp:
    baidu-map:
      url: ${BAIDU_MCP_URL:}
      timeout: ${BAIDU_MCP_TIMEOUT:120}

  # Skills配置
  skills:
    dir: ${AGENT_SKILLS_DIR:./skills}

# AgentScope A2A 配置
agentscope:
  a2a:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
    agent:
      card:
        name: RouteMakingAgent
        description: "路线制定Agent，擅长处理自驾游路线制定"
        version: "1.0.0"

# 日志配置
logging:
  level:
    root: INFO
    routeMakingAgent.mcp.BaiduMapMCP: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
